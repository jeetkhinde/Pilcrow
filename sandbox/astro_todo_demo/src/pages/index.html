---
pub struct Todo {
    pub id: i64,
    pub title: String,
    pub done: bool,
}

pub struct Props {
    pub title: String,
    pub todos: Vec<Todo>,
}
---
<AppLayout title={title}>
  <h1 slot="header">{{ title }}</h1>

  <TodoList todos={todos}>
    <li slot="item" let:entry>
      <TodoCard id={entry.id} title={entry.title} done={entry.done}>
        {% if entry.done %}
          <small>Completed</small>
        {% else %}
          <small>In progress</small>
        {% endif %}
      </TodoCard>
    </li>
  </TodoList>

  <form action="/todos" method="post">
    <input name="title" placeholder="New todo..." />
    <button type="submit">Add</button>
  </form>
</AppLayout>
