[package]
name = "sandbox"
version = "0.1.0"
edition = "2024"

[dependencies]
maud = "0.26"
axum = "0.7"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Link locally to the framework we just moved to /core
pilcrow = { path = "../core" }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
